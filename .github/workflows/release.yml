name: Release and Update Manifest

on:
  workflow_dispatch:
  push:
    tags:
      - "app-v*"

jobs:
  build:
    permissions:
      contents: write
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.9 --activate

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Enable updater artifacts for signed release
        shell: pwsh
        run: |
          $configPath = "src-tauri/tauri.conf.json"
          $config = Get-Content $configPath -Raw | ConvertFrom-Json
          $config.bundle.createUpdaterArtifacts = $true
          $config.bundle.targets = @("nsis")
          $config | ConvertTo-Json -Depth 20 | Set-Content $configPath

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Loci Notepad ${{ github.ref_name }}
          releaseBody: See the setup EXE below to download and install Loci Notepad.
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          updaterJsonPreferNsis: true
          tauriScript: corepack pnpm tauri

  update-manifest:
    needs: build
    permissions:
      contents: write
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - name: Download updater manifest from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          mkdir -p updates
          gh release download "$TAG_NAME" --pattern latest.json --output updates/latest.json --clobber

      - name: Commit updater manifest
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add updates/latest.json
          git commit -m "Update auto-updater manifest for ${GITHUB_REF_NAME}" || echo "No manifest changes"
          git push
