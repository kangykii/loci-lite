<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Loci Notepad</title>
    <link rel="icon" type="image/png" href="/loci-notebook-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;1,400&family=Newsreader:ital,wght@0,400;0,500;0,600;1,400&display=swap"
      rel="stylesheet"
    />
    <script>
      (function () {
        var key = 'loci-lite-theme';
        var stored = localStorage.getItem(key);
        var modes = {
          default_white: 'light',
          default_dark: 'dark',
          anthracite_grey: 'light',
          ochre_black: 'dark',
          light: 'light',
          dark: 'dark',
        };
        var mode = modes[stored] || 'light';
        var notebook = stored && modes[stored] && stored !== 'light' && stored !== 'dark'
          ? stored
          : mode === 'dark'
            ? 'default_dark'
            : 'default_white';
        document.documentElement.dataset.theme = mode;
        document.documentElement.dataset.notebookTheme = notebook;
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
